name: Integration test - Firebase App Distribution

# Manually triggered integration test for the action. It needs:
#   - secrets: FIREBASE_APP_ID, FIREBASE_CREDENTIALS
#   - a real artifact, fetched at runtime from a URL (the repo no longer ships one).
#
# Provide the artifact URL either by passing `artifact_url` when dispatching, or by
# setting a TEST_ARTIFACT_URL repository variable. Firebase validates the binary, so
# it must be a genuine APK/AAB/IPA (an empty placeholder is rejected). For a private
# source (e.g. a GitHub release asset via the API, or a private bucket), set a
# TEST_ARTIFACT_TOKEN secret and it will be sent as a Bearer token.
on:
  workflow_dispatch:
    inputs:
      artifact_url:
        description: URL to download the test artifact (APK/AAB/IPA) from. Defaults to the TEST_ARTIFACT_URL repo variable.
        required: false
        default: ""

jobs:
  test_action:
    runs-on: ubuntu-latest
    env:
      ARTIFACT_URL: ${{ inputs.artifact_url || vars.TEST_ARTIFACT_URL }}
      ARTIFACT_TOKEN: ${{ secrets.TEST_ARTIFACT_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download test artifact
        run: |
          if [ -z "$ARTIFACT_URL" ]; then
            echo "::error::No artifact URL. Pass 'artifact_url' when dispatching, or set the TEST_ARTIFACT_URL repository variable." >&2
            exit 1
          fi
          echo "Downloading test artifact from $ARTIFACT_URL"
          auth=()
          [ -n "$ARTIFACT_TOKEN" ] && auth=(-H "Authorization: Bearer $ARTIFACT_TOKEN")
          curl -fSL "${auth[@]}" -H "Accept: application/octet-stream" "$ARTIFACT_URL" -o app-debug.apk
          ls -lh app-debug.apk

      - name: Extract release information from the latest commit message
        id: extract_release_info
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)

          DIST_GROUPS=$(echo "$COMMIT_MESSAGE" | sed -n '/<!-- SDG -->/,/<!-- EDG -->/p' | sed '1d;$d')
          NOTES=$(echo "$COMMIT_MESSAGE" | sed -n '/<!-- SWWD -->/,/<!-- EWWD -->/p' | sed '1d;$d')

          echo "DISTRIBUTION_GROUPS=$DIST_GROUPS" >> "$GITHUB_ENV"
          {
            echo "RELEASE_NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Distribute to Firebase App Distribution
        id: distribute
        uses: ./
        with:
          artifact: ./app-debug.apk
          app-id: ${{ secrets.FIREBASE_APP_ID }}
          credentials: ${{ secrets.FIREBASE_CREDENTIALS }}
          groups: ${{ env.DISTRIBUTION_GROUPS }}
          release-notes: ${{ env.RELEASE_NOTES }}

      - name: Print release link
        run: echo "Release available at ${{ steps.distribute.outputs.release-link }}"
